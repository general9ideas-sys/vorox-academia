<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Campus VOROX — búsqueda de empleo, armá tu CV y conectá con empresas que publican puestos." />
  <title>Campus empleo | VOROX Academia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Raleway:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css?v=campus-direct" />
</head>
<body>
  <header class="navbar" id="navbar">
    <div class="container navbar__inner">
      <a href="../index.html#inicio" class="navbar__logo" aria-label="VOROX Academia">
        <img src="../assets/logo-vorox.png?v=new" alt="VOROX Academia" class="logo" width="118" height="48" />
      </a>
      <div class="navbar__actions">
        <a href="../index.html#inicio" class="btn btn--outline-nav btn--sm">VOROX Academia</a>
      </div>
    </div>
  </header>

  <main class="campus-empleo" id="campusEmpleo">
    <div class="campus-topbar">
      <div class="container campus-topbar__inner">
        <div>
          <span class="section-tag">Empleabilidad</span>
          <h1>Campus</h1>
          <p>Monitor de búsqueda laboral, armá tu CV y conectá con empresas</p>
        </div>
        <a href="../index.html#inicio">← Volver al inicio</a>
      </div>
    </div>

    <div class="container campus-body">
      <p class="campus-hub__lead">Alumnos certificados y empresas se conectan acá: armá tu CV, postulate o publicá vacantes.</p>

      <nav class="campus-role-switch" aria-label="Tipo de acceso">
        <button type="button" class="campus-role-switch__btn is-active" id="campusRoleStudent" data-campus-role="student">Busco trabajo</button>
        <button type="button" class="campus-role-switch__btn" id="campusRoleCompany" data-campus-role="company">Ofrezco empleo</button>
      </nav>

      <!-- Panel alumno -->
      <section class="campus-panel" id="campusStudent">
        <div class="campus-panel__head">
          <h2>Campus — Profesional</h2>
        </div>
        <nav class="campus-tabs" aria-label="Secciones alumno">
          <button type="button" class="campus-tabs__btn is-active" data-student-tab="perfil">Mi perfil y CV</button>
          <button type="button" class="campus-tabs__btn" data-student-tab="empleos">Buscar empleo</button>
          <button type="button" class="campus-tabs__btn" data-student-tab="postulaciones">Mis postulaciones</button>
        </nav>
        <div id="campusStudentPanel"></div>
      </section>

      <!-- Panel empresa -->
      <section class="campus-panel" id="campusCompany" hidden>
        <div class="campus-panel__head">
          <h2>Campus — Empresa</h2>
        </div>
        <div id="campusCompanyPanel"></div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer__bottom" style="border:none;padding:20px 0;">
      <p>&copy; 2026 VOROX Academia. <a href="../index.html#inicio" style="color:var(--yellow);">Volver al inicio</a></p>
    </div>
  </footer>

  <script src="../js/campus-empleo.js?v=3"></script>
  <script>VoroxCampus.init();</script>
  <script src="../script.js?v=campus-empleo"></script>
</body>
</html>
